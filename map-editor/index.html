<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>地图编辑器</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <strong>地图编辑器</strong>
    <label>地图 <input id="mapId" type="number" value="3" min="0"></label>
    <button id="loadMap">加载</button>
    <button id="modeSelect" class="active">选择/拖动</button>
    <button id="modePlace">放置素材</button>
    <button id="deleteObject">删除</button>
    <label><input id="showCollision" type="checkbox" checked> 碰撞</label>
    <label><input id="showOcclusion" type="checkbox"> 原遮挡</label>
    <button id="resetView">重置视图</button>
    <button id="savePatch">保存 patch</button>
    <button id="exportPatch">导出 JSON</button>
    <span id="status"></span>
  </header>

  <main class="layout">
    <aside class="panel assets">
      <div class="row">
        <input id="assetSearch" placeholder="搜索素材编号">
        <label><input id="largeOnly" type="checkbox" checked> 大素材</label>
      </div>
      <div id="assetList" class="asset-list"></div>
    </aside>

    <section class="viewport">
      <canvas id="canvas"></canvas>
    </section>

    <aside class="panel inspector">
      <h3>选中物件</h3>
      <div id="emptyInspector" class="muted">选择素材后点击地图放置，或点地图上的物件编辑。</div>
      <div id="objectForm" class="form hidden">
        <label>素材编号 <input id="objAssetId" readonly></label>
        <label>X <input id="objX" type="number"></label>
        <label>Y <input id="objY" type="number"></label>
        <label>缩放 <input id="objScale" type="number" step="0.05" min="0.1"></label>
        <label><input id="objOcclusion" type="checkbox"> 参与遮挡/Y排序</label>
        <h3>碰撞框</h3>
        <label>偏移 X <input id="colX" type="number"></label>
        <label>偏移 Y <input id="colY" type="number"></label>
        <label>宽 <input id="colW" type="number"></label>
        <label>高 <input id="colH" type="number"></label>
      </div>
      <p class="hint">滚轮缩放，空格或中键拖动画布。放置坐标和碰撞框都保存到 `map_ID_patch.json`。</p>
    </aside>
  </main>

  <script src="./editor.js?v=20260628-2"></script>
</body>
</html>
