<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>.img 素材处理工具</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>.img 素材处理工具</h1>
      <input id="file" type="file" accept=".img,image/png,image/jpeg,image/gif">
    </header>

    <section class="workspace">
      <aside>
        <label>帧宽 <input id="fw" type="number" min="1" value="150"></label>
        <label>帧高 <input id="fh" type="number" min="1" value="150"></label>
        <label>起点 X <input id="ox" type="number" value="0"></label>
        <label>起点 Y <input id="oy" type="number" value="0"></label>
        <label>间距 X <input id="gx" type="number" value="0"></label>
        <label>间距 Y <input id="gy" type="number" value="0"></label>
        <label>列数 <input id="cols" type="number" min="1" value="8"></label>
        <label>行数 <input id="rows" type="number" min="1" value="1"></label>
        <label>帧率 <input id="fps" type="number" min="1" value="8"></label>
        <div class="buttons">
          <button id="apply">应用切图</button>
          <button id="png">导出整图 PNG</button>
          <button id="frames">导出序列帧</button>
          <button id="json">导出配置</button>
        </div>
        <pre id="info">等待上传 .img 或 PNG。</pre>
      </aside>

      <section class="panels">
        <div class="panel">
          <h2>切图预览</h2>
          <canvas id="sheet"></canvas>
        </div>
        <div class="panel">
          <h2>动画预览</h2>
          <canvas id="anim" width="240" height="240"></canvas>
        </div>
      </section>
    </section>
  </main>
  <script src="src/img-decoder.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
